 news.292.t: "Formation Of Yugoslavia"
 news.292.d: "\"Yugoslavia — can't name a more impressive country, can you? Dragged itself out from the dirt and the scum, rolled up its sleeves and achieved in just ten, twenty years what some other backwaters still can't. Six brotherly peoples, all banded together, stronger for their differences. Tito brought us into the light, and you kept the pace - charting us through the Styrian Counterrevolution... you know me. I was on the frontlines, doing my part, fighting Bosniak petty-nationalism. Tito and Milosevic. That's very, very much the tradition I'm a part of.\"- Milorad Dodik.\n\nAs sounds of fighting ceased with Serbian forces achieving victory against last 'splinter states' in the Balkans, Serbian authorities have declared the revival of Yugoslavia proper, and the last paperwork is being finished, with a holiday declared thoughout all newly reformed state admist the dying backdrop. Despite inital successes against the Western powers there is concern that the head of government, grandson of Marshal Tito Joska Broz, has become too old and ill to lead and a pact with the newely founded reformist wing will soon take allow them to take charge.\nThe Government In Belgarde has long claimed that it has learned from mistakes of previous union, and modernized their vision for new unified south-slavic state."
 news.292.a: "Don't play the games they play. Don't let anyone take it away from you."
