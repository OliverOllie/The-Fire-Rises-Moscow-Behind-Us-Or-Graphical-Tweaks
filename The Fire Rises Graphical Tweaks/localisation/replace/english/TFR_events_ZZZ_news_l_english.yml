 news.292.t: "Yugoslavia Rises From The Grave"
 news.292.d: "\"Yugoslavia — can't name a more impressive country, can you? Dragged itself out from the dirt and the scum, rolled up its sleeves and achieved in just ten, twenty years what some other backwaters still can't. Six brotherly peoples, all banded together, stronger for their differences. Tito brought us into the light, and you kept the pace - charting us through the Styrian Counterrevolution... you know me. I was on the frontlines, doing my part, fighting Bosniak petty-nationalism. Tito and Milosevic. That's very, very much the tradition I'm a part of.\"- Milorad Dodik.\n\nAs sounds of fighting ceased with Serbian forces achieving victory against last 'splinter states' in the Balkans, Serbian authorities have declared the revival of Yugoslavia proper, and with the last paperwork is being finished, a holiday has been declared thoughout the newly reformed state admist the dying backdrop. Despite inital successes against the Western powers there is rumors that the head of government, grandson of Marshal Tito Joska Broz, has become too old and ill to lead and a pact with the newely founded reformist wing will soon take allow them to take charge.\nThe Government In Belgarde has long claimed that it has learned from mistakes of previous union, and modernized their vision for new unified south-slavic state."
 news.292.a: "Don't play the games they play. Don't let anyone take it away from you."
 news.163.t: "Fools Dressed In Brown Reunite America"
 news.163.d: "The last opposing governments in the former United States officially surrendered last night to Burt Colucci and his army of National Socialists, marking the end of a brutal Civil War that left tens of millions dead and even more displaced. Various resistance leaders were executed by the new government after a short trial, with their bodies being strung up outside the Republic's new capital. Speaking from his headquarters in Washington, In a morning address at the hastily cleaned-up remains of the U.S. Capitol where the bodies of thousands of Jews and non-whites hang from light poles and streetlamps - The American declared to the nation a \"new era of prosperity for the Anglo-Aryan Race.\" With the entire nation now under their control, the new Nazi State in America has reportedly already begun a horrifically large-scale campaign of ethnic cleansing. Fighting remains heavy across the country and is likely to continue for quite some time, but the end of official opposition marks a turning point in the Colucci regime's consolidation of power. Reactions to the news have been overwhelmingly negative, and the new republic is unlikely to garner recognition on the world stage.\n\nWhatever happens next, the message is clear: National Socialism, in all its brutality, has stopped hiding in the shadows and planted the Blutfahne in America."
 news.163.a: "America has reached it's natural conculsion."
 news.163.b: "The Commander's Dream, Fulfilled."
