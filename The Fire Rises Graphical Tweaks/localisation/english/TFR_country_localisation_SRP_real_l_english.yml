l_english:
SRP_milorad_dodik_char_desc: "There is a deep, identical wrongness present in every single red blood cell of your body that finds it's most precise expression in the exact geometric proportions of your bones. This condition is known as "being Serbian".\n\nWhen the Voda stepped down, citing some vague health condition you won't pretend to care enough about to remember, History stopped around you. The Party scrambled. The Nation froze. Who could possibly replace him? Who could tame the beast of Yugoslavia like he had? Who could fulfill Tito's vision like he had? Who could go on all those disgusting press-circuits to the deepest sinews of Washington D.C. & smile so wide, with such a precise & disinterested hatred for humanity behind his glazed eyes, with such ichor dripping from his teeth, that the Americans adored it? They searched and searched and screamed. And then you introduced yourself. You are a patriot. You are a Yugoslavian. You are a Marxist. You are a "Progressive Capitalist". You are a Serbian. You are a Bosnian.\n\nWhat are you, Milorad Dodik? It doesn't matter.\n\nWhat matters is that you are Voda's chosen."

