l_english:
CRO_zoran_milanovic_char_desc: "He ducks and weaves through crowds of reporters like he's won an Olympic gold medal in spinelessness. He shakes hands and returns smiles with practiced confidence. When the industrial peasant looks him in the eye they see the All-Yugoslavian & their hearts swell with pride. He is everything you want him to be: (Relatively) Young, Charming, Athletic, simultaneously Business-savvy and a tried-and-true Дpyr of the Proletariat. Apparently, his uncle-or-something was a Nazi-or-something, which ought to energize Croatian & Slovenian voters. You see it in his eyes, the way he still thinks he believes in something. It's funny. The depths to which he'll sink for you never cease to amuse."
SRP_milorad_dodik_char_desc: "There is a deep, identical wrongness present in every single red blood cell of your body that finds it's most precise expression in the exact geometric proportions of your bones. This condition is known as "being Serbian".\n\nWhen the Vodja stepped down, citing some vague health condition you won't pretend to care enough about to remember, History stopped around you. The Party scrambled. The Nation froze. Who could possibly replace him? Who could tame the beast of Yugoslavia like he had? Who could fulfill Tito's vision like he had? Who could go on all those disgusting press-circuits to the deepest sinews of Washington D.C. & smile so wide, with such a precise & disinterested hatred for humanity behind his glazed eyes, with such ichor dripping from his teeth, that the Americans adored it? They searched and searched and screamed. And then you introduced yourself. You are a patriot. You are a Yugoslavian. You are a Marxist. You are a "Progressive Capitalist". You are a Serbian. You are a Bosnian.\n\nWhat are you, Milorad Dodik? It doesn't matter.\n\nWhat matters is that you are Vodja's chosen."