  Navalny_Coup_Super_button: "A New Russia?"
  Russia_Kazakhstan_Pacification_Super_title: "Russian Pacification of Kazakhstan"
  Russia_Kazakhstan_Pacification_Super_text: "\"Order must be restored, whatever the cost.\"\n — Vladimir Putin"
  Russia_Kazakhstan_Pacification_Super_button: "Empire Reasserted"
  Spanish_Civil_War_Super_title: "Second Spanish Civil War"
  Spanish_Civil_War_Super_text: "\"The sleep of reason produces monsters.\"\n — Francisco Goya"
  Spanish_Civil_War_Super_button: "History Repeats"