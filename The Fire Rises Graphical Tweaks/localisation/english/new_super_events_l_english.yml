l_english:
  UKR_Super_SpecialOperation_title: "Special Military Operation in Ukraine"
  UKR_Super_SpecialOperation_text: "\"Everybody imposes his own system as far as his army can reach.\"\n - Joseph Stalin"
  UKR_Super_SpecialOperation_button: "Onward, Comrades!"
  MEX_Cartel_War_title: "Cartel War in Mexico"
  MEX_Cartel_War_text: "\"When you ask people, “What’s America’s longest war?” they usually answer “Vietnam” or amend that to “Afghanistan,” but it’s neither. America’s longest war is the war on drugs.\"\n ― Don Winslow"
  MEX_Cartel_War_button: "Chaos in Paradise"
  Serbian_Kosovo_War_title: "Beginning of Second Yugoslavian War"
  Serbian_Kosovo_War_text: "\"But we acted pre-emptively in Kosovo in 1999 to stop Milosevic from doing what he was doing and increasingly doing the ethnic cleansing in a systematic way.\"\n ― Lord Robertson"
  Serbian_Kosovo_War_button: "Second Time?"
  Second_Korean_War_title: "Second Korean War"
  Second_Korean_War_text: "\"The reunification of the homeland is the greatest task facing our people.\"\n — Kim Jong-il"
  Second_Korean_War_button: "The Peninsula Burns Again"
  Fourth_Arab_Israeli_War_Super_title: "Fourth Arab-Israeli War"
  Fourth_Arab_Israeli_War_Super_text: "\"Peace will come when the Arabs will love their children more than they hate us.\"\n — Golda Meir"
  Fourth_Arab_Israeli_War_Super_button: "War in the Holy Land"
  Myanmar_Civil_War_Super_title: "Myanmar Civil War"
  Myanmar_Civil_War_Super_text: "\"You can imprison a man, but not an idea.\"\n — Aung San"
  Myanmar_Civil_War_Super_button: "The Union Fractures in Fire"
  Wagner_Coup_Super_title: "Wagner Coup"
  Wagner_Coup_Super_text: "\"These are Wagner lads who died today. The blood is still fresh. They came here as volunteers and are dying so you can sit like fat cats in your luxury offices.\"\n — Yevgeny Prigozhin"
  Wagner_Coup_Super_button: "The Shadow Strikes Within"
  Central_American_War_Super_title: "Central American War"
  Central_American_War_Super_text: "\"The United States has caused more trouble in Central America than any other single factor.\"\n — Che Guevara"
  Central_American_War_Super_button: "Revolution Reignites"
  Syrian_Civil_War_End_Bashar_Super_title: "End of Syrian Civil War"
  Syrian_Civil_War_End_Bashar_Super_text: "\"We are fighting a war not only against terrorists, but also against those who support them.\"\n — Bashar al-Assad"
  Syrian_Civil_War_End_Bashar_Super_button: "Peace, but at what cost?"
  Algeria_Morocco_War_Super_title: "Algerian-Moroccan War"
  Algeria_Morocco_War_Super_text: "\"Borders drawn by colonizers cannot contain the spirit of a nation.\"\n — Houari Boumédiène"
  Algeria_Morocco_War_Super_button: "Brothers at War"
  Ethiopia_Egypt_War_Super_title: "Third African War"
