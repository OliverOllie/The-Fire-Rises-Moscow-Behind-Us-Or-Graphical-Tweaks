 germany.8.d: "Following the devestating loss in the war with Russia, extremist elements of the Bundeswehr have couped the government. Black Clad KSK Special Forces troops have marched on Berlin, facing nearly no resistance. As Leopards surrounded the Bundestag, Berliners stood in stunned silence as many politicians were put in front of Kangaroo Courts and sentanced to death for\n\"Crimes against the German Nation\"\n.\n\nThe Leader of the coup, a actor turned radical named Volker Bruch has stated that the\n\"degeneration of the German people and nation shall be halted today.\" Martial Law has been instated throughout the nation, with shoot-to-kill orders being filed for violaters of the curfew.\n\n The civilian government has been \n\"temporarily\n\" suspended, with the military high command in power, with the Rädelsführer at the lead.\n\nNearly immediately, other nations such as France and the United Kingdom suspending relations due to authoritarian measures in the nation. As Europe stays reeling after the loss after the Russia-NATO war, it seems that another nation has fallen to extremism."
 germany.9.d: "Following the devestating loss in the war with Russia, extremist elements of the Bundeswehr have couped the government of Germany. Black Clad KSK Special Forces troops have marched on Berlin, facing nearly no resistance. As Leopards surrounded the Bundestag, Berliners stood in stunned silence as many politicians were put in front of Kangaroo Courts and sentanced to death for \n\"Crimes against the German Nation\"\n\nThe Leader of the coup, a actor turned radical named Volker Bruch has stated that the\n\"degeneration of the German people and nation shall be halted today.\" Martial Law has been instated throughout the nation, with shoot-to-kill orders being filed for violaters of the curfew.\n\n The civilian government has been \n\"temporarily\n\" suspended, with the military high command in power, with the Rädelsführer at the lead.\n\nNearly immediately, other nations such as France and the United Kingdom suspending relations due to authoritarian measures in the nation. As Europe stays reeling after the loss after the Russia-NATO war, it seems that another nation has fallen to extremism."

