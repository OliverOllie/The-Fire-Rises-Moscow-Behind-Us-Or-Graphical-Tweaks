 russia.2125.t: "A New Name for the New Federation"
 russia.2125.d: "Russia has gone through so many unthinkable events over the past decade: the Medvedev Thaw, the War, Alihanov's Dictatorship, and the New Revolution. In this regard, a controversial proposal has been submitted by State Duma deputy from the "People's Alliance", Sergey Nalivkin — to rename the country to the "Russian Republic" thereby symbolizing the rebirth of democratic Russia after such a turbulent time like in the days of 1917. Is it worth doing this at the cost of harkening back to a unstable time in history?"
 russia.2125.b: "Leave it as it is..."
 russia.2125.a: "For the Russian Republic!"

